<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GlowOS Control</title>
  <style>
    :root {
      --bg: #eef3ef;
      --ink: #18251f;
      --card: #ffffff;
      --line: #d7e1da;
      --accent: #1f8f62;
      --accent2: #2458d4;
      --warn: #ca4b2b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 10%, #f5faf3 0, #e7efe8 45%, #dfe9e2 100%);
    }

    .wrap { max-width: 1040px; margin: 0 auto; padding: 18px 14px 26px; }
    .head { display: flex; justify-content: space-between; align-items: end; gap: 12px; margin-bottom: 12px; }
    h1 { font-size: 28px; letter-spacing: .04em; margin: 0; }
    .muted { font-size: 13px; opacity: .72; }

    .live {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      margin: 12px 0 16px;
    }

    .metric {
      background: linear-gradient(180deg, #fff, #f5faf7);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .k { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; opacity: .68; }
    .v { font-size: 20px; font-weight: 700; margin-top: 4px; }

    .shell {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 10px 26px rgba(20, 42, 33, .08);
    }

    .tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }

    .tab {
      border: 1px solid var(--line);
      background: #f6faf7;
      color: var(--ink);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .panel { display: none; animation: fade .22s ease; }
    .panel.active { display: block; }

    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    .field { display: flex; flex-direction: column; gap: 6px; }

    label { font-size: 13px; font-weight: 700; }

    input,
    select {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 15px;
      background: #fff;
      color: var(--ink);
    }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      background: var(--accent2);
    }

    button.alt { background: var(--accent); }
    button.warn { background: var(--warn); }

    button.ghost {
      color: var(--ink);
      background: #f2f7f3;
      border: 1px solid var(--line);
    }

    .mode { display: flex; gap: 8px; margin-bottom: 12px; }
    .mode button.active { outline: 3px solid rgba(31, 143, 98, .22); }

    .swatch {
      height: 58px;
      border-radius: 10px;
      border: 1px solid var(--line);
      margin-top: 10px;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    input[type=color] {
      width: 56px;
      height: 40px;
      padding: 2px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      opacity: .8;
    }

    .status { margin-top: 10px; font-size: 13px; opacity: .78; }

    input[type=range] { width: 100%; }

    @media (max-width: 820px) {
      .live { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1>GlowOS Console</h1>
        <div class="muted">AP: 192.168.4.1</div>
      </div>
      <div class="muted" id="liveStamp">Waiting for live values...</div>
    </div>

    <div class="live">
      <div class="metric"><div class="k">System state</div><div class="v" id="mState">--</div></div>
      <div class="metric"><div class="k">Battery voltage</div><div class="v" id="mBat">-- mV</div></div>
      <div class="metric"><div class="k">Out voltage</div><div class="v" id="mOutV">-- mV</div></div>
      <div class="metric"><div class="k">Out current</div><div class="v" id="mOutI">-- mA</div></div>
      <div class="metric"><div class="k">RC measurement</div><div class="v" id="mRc">Pending</div></div>
    </div>

    <div class="shell">
      <div class="tabs">
        <button class="tab active" data-panel="settingsPanel">Settings</button>
        <button class="tab" data-panel="manualPanel">Manual Control</button>
      </div>

      <section class="panel active" id="settingsPanel">
        <div class="grid">
          <div class="field">
            <label for="batteryCells">Battery Cells</label>
            <select id="batteryCells">
              <option value="0">Auto</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
          <div class="field">
            <label for="batteryLowVoltage">Battery Low Voltage (V)</label>
            <input id="batteryLowVoltage" type="number" min="2.5" max="3.7" step="0.01">
          </div>
          <div class="field">
            <label for="batteryCritVoltage">Battery Critical Voltage (V)</label>
            <input id="batteryCritVoltage" type="number" min="2.5" max="3.5" step="0.01">
          </div>
          <div class="field">
            <label for="ledNumLeds">Number of LEDs</label>
            <input id="ledNumLeds" type="number" min="0" max="5" step="1">
          </div>
          <div class="field">
            <label for="ledBrightness">LED Brightness (0..1)</label>
            <input id="ledBrightness" type="number" min="0" max="1" step="0.01">
          </div>
          <div class="field">
            <label for="glowVoltage">Glow Voltage (V)</label>
            <input id="glowVoltage" type="number" min="0" max="5.5" step="0.01">
          </div>
          <div class="field">
            <label for="glowBoost">Glow Boost (V)</label>
            <input id="glowBoost" type="number" min="0" max="6.0" step="0.01">
          </div>
          <div class="field">
            <label for="glowBoostTime">Glow Boost Time (s)</label>
            <input id="glowBoostTime" type="number" min="0" max="10" step="0.1">
          </div>
          <div class="field">
            <label for="receiverType">Receiver Type</label>
            <select id="receiverType">
              <option value="PPM">PPM</option>
              <option value="SBUS">SBUS</option>
              <option value="IBUS">IBUS</option>
              <option value="CRSF">CRSF</option>
            </select>
          </div>
          <div class="field">
            <label for="receiverFailsafeTimeout">Failsafe Timeout (s)</label>
            <input id="receiverFailsafeTimeout" type="number" min="0.1" max="5" step="0.1">
          </div>
          <div class="field">
            <label for="receiverThreshold">Receiver Threshold</label>
            <input id="receiverThreshold" type="number" min="0" max="100" step="1">
          </div>
          <div class="field" style="grid-column:1/-1;">
            <label for="configPreview">JSON Preview</label>
            <textarea id="configPreview" rows="10" readonly style="width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 11px;font-size:13px;background:#fff;color:var(--ink);"></textarea>
          </div>
        </div>
        <div class="actions">
          <button class="ghost" id="loadSettings">Load</button>
          <button class="alt" id="saveSettings">Save</button>
        </div>
        <div class="status" id="settingsStatus">Settings ready.</div>
      </section>

      <section class="panel" id="manualPanel">
        <div class="mode">
          <button class="ghost" id="modeAuto">Auto</button>
          <button class="ghost" id="modeManual">Manual</button>
        </div>

        <div class="grid">
          <div>
            <label>LED color</label>
            <div class="color-row">
              <input id="ledColor" type="color" value="#000080">
              <span class="mono" id="ledHex">#000080</span>
            </div>
            <div class="swatch" id="swatch"></div>
            <div class="actions"><button id="applyLed">Apply LED</button></div>
          </div>

          <div>
            <label for="manualVolt">Output voltage</label>
            <input id="manualVolt" type="number" min="0" max="5.5" step="0.05" value="2.0">
            <div class="actions">
              <button id="applyVolt">Apply Voltage</button>
              <button class="alt" id="powerOn">Power ON</button>
              <button class="warn" id="powerOff">Power OFF</button>
            </div>
          </div>
        </div>

        <div class="status" id="manualStatus">Manual control ready.</div>
      </section>
    </div>
  </div>

  <script>
    const qs = (s) => document.querySelector(s);
    const qsa = (s) => Array.from(document.querySelectorAll(s));
    const state = { manual: false };

    function tabSwitch(id) {
      qsa('.tab').forEach((b) => b.classList.toggle('active', b.dataset.panel === id));
      qsa('.panel').forEach((p) => p.classList.toggle('active', p.id === id));
    }

    qsa('.tab').forEach((b) => b.addEventListener('click', () => tabSwitch(b.dataset.panel)));

    function hexToRgb(hex) {
      const value = hex.replace('#', '');
      return {
        r: parseInt(value.slice(0, 2), 16),
        g: parseInt(value.slice(2, 4), 16),
        b: parseInt(value.slice(4, 6), 16),
      };
    }

    function refreshSwatch() {
      const hex = qs('#ledColor').value;
      qs('#swatch').style.background = hex;
      qs('#ledHex').textContent = hex.toUpperCase();
    }

    qs('#ledColor').addEventListener('input', refreshSwatch);

    function setModeButtons() {
      qs('#modeAuto').classList.toggle('active', !state.manual);
      qs('#modeManual').classList.toggle('active', state.manual);
    }

    async function setMode(manual) {
      qs('#manualStatus').textContent = 'Switching mode...';
      try {
        const res = await fetch('/api/mode?manual=' + (manual ? 1 : 0));
        if (!res.ok) throw new Error(String(res.status));
        state.manual = manual;
        setModeButtons();
        qs('#manualStatus').textContent = 'Mode: ' + (state.manual ? 'MANUAL' : 'AUTO');
      } catch (e) {
        qs('#manualStatus').textContent = 'Mode update failed';
      }
    }

    qs('#modeAuto').addEventListener('click', () => setMode(false));
    qs('#modeManual').addEventListener('click', () => setMode(true));

    qs('#applyLed').addEventListener('click', async () => {
      qs('#manualStatus').textContent = 'Sending LED command...';
      try {
        const rgb = hexToRgb(qs('#ledColor').value);
        const u = '/api/led?r=' + rgb.r + '&g=' + rgb.g + '&b=' + rgb.b;
        const res = await fetch(u);
        qs('#manualStatus').textContent = res.ok ? 'LED command queued' : 'LED command failed';
      } catch (e) {
        qs('#manualStatus').textContent = 'LED request error';
      }
    });

    qs('#applyVolt').addEventListener('click', async () => {
      qs('#manualStatus').textContent = 'Sending voltage command...';
      try {
        const u = '/api/voltage?v=' + encodeURIComponent(qs('#manualVolt').value);
        const res = await fetch(u);
        qs('#manualStatus').textContent = res.ok ? 'Voltage command queued' : 'Voltage command failed';
      } catch (e) {
        qs('#manualStatus').textContent = 'Voltage request error';
      }
    });

    qs('#powerOn').addEventListener('click', async () => {
      try {
        const res = await fetch('/api/power?en=1');
        qs('#manualStatus').textContent = res.ok ? 'Power ON queued' : 'Power ON failed';
      } catch (e) {
        qs('#manualStatus').textContent = 'Power ON request error';
      }
    });

    qs('#powerOff').addEventListener('click', async () => {
      try {
        const res = await fetch('/api/power?en=0');
        qs('#manualStatus').textContent = res.ok ? 'Power OFF queued' : 'Power OFF failed';
      } catch (e) {
        qs('#manualStatus').textContent = 'Power OFF request error';
      }
    });

    function getConfigFromForm() {
      return {
        battery: {
          ncells: Number(qs('#batteryCells').value),
          low_voltage: Number(qs('#batteryLowVoltage').value),
          crit_voltage: Number(qs('#batteryCritVoltage').value),
        },
        leds: {
          num_leds: Number(qs('#ledNumLeds').value),
          brightness: Number(qs('#ledBrightness').value),
        },
        glow: {
          voltage: Number(qs('#glowVoltage').value),
          boost: Number(qs('#glowBoost').value),
          boost_time: Number(qs('#glowBoostTime').value),
        },
        receiver: {
          type: qs('#receiverType').value,
          failsafe_timeout: Number(qs('#receiverFailsafeTimeout').value),
          threshold: Number(qs('#receiverThreshold').value),
        },
      };
    }

    function setFormFromConfig(config) {
      qs('#batteryCells').value = String(config.battery.ncells);
      qs('#batteryLowVoltage').value = Number(config.battery.low_voltage).toFixed(2);
      qs('#batteryCritVoltage').value = Number(config.battery.crit_voltage).toFixed(2);
      qs('#ledNumLeds').value = String(config.leds.num_leds);
      qs('#ledBrightness').value = Number(config.leds.brightness).toFixed(2);
      qs('#glowVoltage').value = Number(config.glow.voltage).toFixed(2);
      qs('#glowBoost').value = Number(config.glow.boost).toFixed(2);
      qs('#glowBoostTime').value = Number(config.glow.boost_time).toFixed(1);
      qs('#receiverType').value = config.receiver.type;
      qs('#receiverFailsafeTimeout').value = Number(config.receiver.failsafe_timeout).toFixed(1);
      qs('#receiverThreshold').value = String(config.receiver.threshold);
    }

    function updateConfigPreview() {
      const config = getConfigFromForm();
      qs('#configPreview').value = JSON.stringify(config, null, 2);
    }

    async function loadSettings() {
      qs('#settingsStatus').textContent = 'Loading settings...';
      try {
        const res = await fetch('/api/config');
        if (!res.ok) throw new Error(String(res.status));
        const config = await res.json();
        setFormFromConfig(config);
        updateConfigPreview();
        qs('#settingsStatus').textContent = 'Settings loaded.';
      } catch (e) {
        qs('#settingsStatus').textContent = 'Load failed';
      }
    }

    async function saveSettings() {
      qs('#settingsStatus').textContent = 'Saving settings...';
      const configJson = JSON.stringify(getConfigFromForm());
      updateConfigPreview();
      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: configJson,
        });
        if (!res.ok) throw new Error(String(res.status));
        await loadSettings();
        qs('#settingsStatus').textContent = 'Settings saved.';
      } catch (e) {
        qs('#settingsStatus').textContent = 'Save failed';
      }
    }

    qs('#loadSettings').addEventListener('click', loadSettings);
    qs('#saveSettings').addEventListener('click', saveSettings);

    ['#batteryCells', '#batteryLowVoltage', '#batteryCritVoltage', '#ledNumLeds', '#ledBrightness', '#glowVoltage', '#glowBoost', '#glowBoostTime', '#receiverType', '#receiverFailsafeTimeout', '#receiverThreshold']
      .forEach((id) => qs(id).addEventListener('input', updateConfigPreview));

    async function refreshLive() {
      try {
        const res = await fetch('/api/live');
        if (!res.ok) throw new Error(String(res.status));
        const d = await res.json();
        state.manual = !!d.manual_mode;
        setModeButtons();
        qs('#mState').textContent = d.system_state;
        qs('#mBat').textContent = d.vbat_mV + ' mV';
        qs('#mOutV').textContent = d.vout_mV + ' mV';
        qs('#mOutI').textContent = d.iout_mA + ' mA';
        qs('#mRc').textContent = d.rc_measurement;
        qs('#liveStamp').textContent = 'Live @ ' + new Date().toLocaleTimeString();
      } catch (e) {
        qs('#liveStamp').textContent = 'Live data unavailable';
      }
    }

    refreshSwatch();
    setModeButtons();
    updateConfigPreview();
    loadSettings();
    refreshLive();
    setInterval(refreshLive, 1000);
  </script>
</body>
</html>
